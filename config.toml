base_url = "https://Honey608.github.io"
title = "Honey"
description = "This is an example description"
build_search_index = true
generate_feeds = true
compile_sass = true
minify_html = true
taxonomies = [{ name = "tags" }]

[search]
include_title = true
include_description = true
include_path = true
include_content = true
index_format = "elasticlunr_json"

[markdown]
insert_anchor_links = 'none'

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"
error_on_missing_language = false

[extra]
toc = true
use_cdn = false
favicon = "/icon/favicon.png"
theme = "toggle"              # light, dark, auto, toggle, toggle-auto
fancy_code = true
dynamic_note = true           # a note that can be toggled
mathjax = true
repo_url = ""

fediverse = false    # author attribution
fediverse_creator = ""    # e.g. @user@instance

menu = [
    { name = "/posts", url = "/posts", weight = 1 },
    { name = "/books", url = "/books", weight = 2 },
    { name = "/resources", url = "/projects", weight = 3 },
    { name = "/thoughts", url = "/talks", weight = 4 },
    { name = "/tags", url = "/tags", weight = 5 },
]

socials = [
]

stylesheets = [
    # "custom.css"    # at /static/custom.css
]

[extra.taxonomies]
sort_by = "page_count"         # e.g. name, page_count
reverse = true

[extra.analytics]
enabled = false

[extra.analytics.goatcounter]
user = "your_user"
host = "example.com" # default= goatcounter.com

[extra.analytics.umami]
website_id = "43929cd1-1e83...."
host_url = "https://stats.mywebsite.com" # default: https://api-gateway.umami.dev/

[extra.analytics.google]
tracking_id = "G-XXXXXXXXXX"  # Your Google Analytics tracking ID
